# Cargo-deny configuration.
#
# This repo is dual-licensed under MIT OR Apache-2.0.
# Third-party crates must be compatible with that posture.

[advisories]
# `paste` is flagged as unmaintained (RUSTSEC-2024-0436) and is currently pulled in
# transitively by `wgpu-hal` (Metal backend). We keep this as an explicit, reviewed
# exception until upstream removes the dependency or we migrate away from it.
ignore = [{ id = "RUSTSEC-2024-0436", reason = "Transitive via wgpu-hal; unmaintained but not a known vulnerability. Track upstream and revisit." }]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
# Keep this false to also lint workspace crates (including unpublished ones),
# so missing/incorrect metadata is caught before open-sourcing.
ignore = false

[sources]
# For open-source hygiene, keep dependencies on crates.io unless explicitly reviewed.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
