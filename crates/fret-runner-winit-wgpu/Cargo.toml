[package]
name = "fret-runner-winit-wgpu"
version.workspace = true
edition.workspace = true

[features]
# Some upstream macros (`objc`'s `msg_send!`) include `cfg(feature = "cargo-clippy")`.
# Declaring it avoids `unexpected_cfgs` warnings under Rust's check-cfg.
cargo-clippy = []

[dependencies]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-app = { path = "../fret-app" }
fret-core = { path = "../fret-core" }
fret-runtime = { path = "../fret-runtime" }
fret-platform = { path = "../fret-platform" }
fret-platform-desktop = { path = "../fret-platform-desktop" }
fret-platform-winit = { path = "../fret-platform-winit" }
fret-render = { path = "../fret-render" }
pollster.workspace = true
slotmap.workspace = true
thiserror.workspace = true
tracing.workspace = true
wgpu.workspace = true
winit.workspace = true

[target.'cfg(all(not(target_arch = "wasm32"), target_os = "macos"))'.dependencies]
cocoa.workspace = true
objc.workspace = true

[target.'cfg(all(not(target_arch = "wasm32"), windows))'.dependencies]
windows-sys.workspace = true
