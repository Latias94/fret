[package]
name = "fret-runner-winit"
version.workspace = true
edition.workspace = true

[dependencies]
fret-core = { path = "../fret-core" }
winit.workspace = true
accesskit.workspace = true
fret-a11y-accesskit = { path = "../fret-a11y-accesskit" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Document", "Element", "Event", "EventTarget", "HtmlCanvasElement", "PointerEvent", "Window"] }
