[package]
name = "fret-render-wgpu"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "WGPU backend implementation for Fret rendering."

[features]
default = []
# Enables wasm-only WebGPU/Tint guardrail tests. Keep this off by default so wasm test runners that
# don't provide browser WebGPU (e.g. node-based CI) can still run non-WebGPU wasm gates.
wasm-webgpu-tests = []

[dependencies]
fret-render-core = { version = "0.1.0", path = "../fret-render-core" }
fret-render-text = { version = "0.1.0", path = "../fret-render-text" }
fret-perf = { version = "0.1.0", path = "../fret-perf" }

wgpu.workspace = true
bytemuck.workspace = true
anyhow.workspace = true
glam.workspace = true
fret-core = { version = "0.1.0", path = "../fret-core" }
slotmap.workspace = true
thiserror.workspace = true
parley.workspace = true
swash.workspace = true
ttf-parser.workspace = true
read-fonts.workspace = true
unicode-script.workspace = true
unicode-segmentation.workspace = true
etagere.workspace = true
lyon.workspace = true
resvg.workspace = true
usvg.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
naga = { workspace = true, features = ["wgsl-in"] }

[dev-dependencies]
pollster.workspace = true
fret-fonts = { version = "0.1.0", path = "../fret-fonts", features = ["bootstrap-subset", "emoji", "cjk-lite", "test-support"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"

[lints.clippy]
field_reassign_with_default = "allow"
