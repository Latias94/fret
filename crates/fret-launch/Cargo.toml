[package]
name = "fret-launch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Application launch glue that wires Fret app, platform, runner, and renderer stacks."

[features]
# Some upstream macros (`objc`'s `msg_send!`) include `cfg(feature = "cargo-clippy")`.
# Declaring it avoids `unexpected_cfgs` warnings under Rust's check-cfg.
cargo-clippy = []
# Dev-only hotpatch integration (Subsecond). Feature-gated to avoid leaking dev tooling deps
# into normal builds. See ADR 0107.
hotpatch-subsecond = ["dep:serde_json", "dep:subsecond", "dep:tungstenite"]
diag-screenshots = ["dep:serde_json", "dep:image"]
wasm-emoji-fonts = ["fret-fonts/emoji"]
wasm-cjk-lite-fonts = ["fret-fonts/cjk-lite"]

[dependencies]
fret-app = { version = "0.1.0", path = "../fret-app" }
fret-core = { version = "0.1.0", path = "../fret-core" }
fret-runtime = { version = "0.1.0", path = "../fret-runtime" }
fret-render = { version = "0.1.0", package = "fret-render-wgpu", path = "../fret-render-wgpu" }
fret-runner-winit = { version = "0.1.0", path = "../fret-runner-winit" }
bytemuck.workspace = true
thiserror.workspace = true
tracing.workspace = true
wgpu.workspace = true
winit.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-platform = { version = "0.1.0", path = "../fret-platform" }
fret-platform-native = { version = "0.1.0", path = "../fret-platform-native" }
pollster.workspace = true
slotmap.workspace = true
renderdog.workspace = true
stacksafe.workspace = true
serde_json = { workspace = true, optional = true }
image = { workspace = true, optional = true }
subsecond = { version = "0.7.2", optional = true }
tungstenite = { version = "0.27.0", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-fonts = { version = "0.1.0", path = "../fret-fonts" }
fret-platform-web = { version = "0.1.0", path = "../fret-platform-web" }
fret-runner-web = { version = "0.1.0", path = "../fret-runner-web" }
getrandom = { workspace = true, features = ["wasm_js"] }
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["CssStyleDeclaration", "Document", "Element", "EventTarget", "HtmlCanvasElement", "HtmlElement", "Location", "MediaQueryList", "MediaQueryListEvent", "Node", "VisualViewport", "Window", "console"] }

[target.'cfg(all(not(target_arch = "wasm32"), target_os = "macos"))'.dependencies]
cocoa.workspace = true
objc.workspace = true
keyboard-types.workspace = true

[target.'cfg(all(not(target_arch = "wasm32"), target_os = "windows"))'.dependencies]
windows-sys = { workspace = true, features = ["Win32_Foundation", "Win32_System_LibraryLoader", "Win32_UI_Accessibility", "Win32_UI_WindowsAndMessaging"] }
