[package]
name = "fret-launch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Application launch glue that wires Fret app, platform, runner, and renderer stacks."

[features]
# Some upstream macros (`objc`'s `msg_send!`) include `cfg(feature = "cargo-clippy")`.
# Declaring it avoids `unexpected_cfgs` warnings under Rust's check-cfg.
cargo-clippy = []
# Dev-only fast-restart state restore (window geometry, later docking/app state).
dev-state = ["fret-launch-desktop/dev-state"]
# Dev-only hotpatch integration (Subsecond). Feature-gated to avoid leaking dev tooling deps
# into normal builds. See ADR 0105.
hotpatch-subsecond = ["fret-launch-desktop/hotpatch-subsecond"]
diag-screenshots = ["fret-launch-desktop/diag-screenshots"]
wasm-emoji-fonts = ["fret-launch-web/wasm-emoji-fonts"]
wasm-cjk-lite-fonts = ["fret-launch-web/wasm-cjk-lite-fonts"]

[dependencies]
fret-launch-core = { version = "0.1.0", path = "../fret-launch-core" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-launch-desktop = { version = "0.1.0", path = "../fret-launch-desktop" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-launch-web = { version = "0.1.0", path = "../fret-launch-web" }
