[package]
name = "fret-launch"
version.workspace = true
edition.workspace = true

[features]
# Some upstream macros (`objc`'s `msg_send!`) include `cfg(feature = "cargo-clippy")`.
# Declaring it avoids `unexpected_cfgs` warnings under Rust's check-cfg.
cargo-clippy = []
# Dev-only hotpatch integration (Subsecond). Feature-gated to avoid leaking dev tooling deps
# into normal builds. See ADR 0107.
hotpatch-subsecond = []

[dependencies]
fret-app = { path = "../fret-app" }
fret-core = { path = "../fret-core" }
fret-runtime = { path = "../fret-runtime" }
fret-render = { path = "../fret-render" }
fret-runner-winit = { path = "../fret-runner-winit" }
thiserror.workspace = true
wgpu.workspace = true
winit.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-platform = { path = "../fret-platform" }
fret-platform-native = { path = "../fret-platform-native" }
pollster.workspace = true
slotmap.workspace = true
tracing.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-fonts = { path = "../fret-fonts" }
fret-platform-web = { path = "../fret-platform-web" }
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Location", "Window", "console"] }

[target.'cfg(all(not(target_arch = "wasm32"), target_os = "macos"))'.dependencies]
cocoa.workspace = true
objc.workspace = true
