[package]
name = "fret-launch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Application launch glue that wires Fret app, platform, runner, and renderer stacks."

[features]
# Some upstream macros (`objc`'s `msg_send!`) include `cfg(feature = "cargo-clippy")`.
# Declaring it avoids `unexpected_cfgs` warnings under Rust's check-cfg.
cargo-clippy = []
# Dev-only fast-restart state restore (window geometry, later docking/app state).
dev-state = ["dep:serde", "dep:serde_json"]
# Dev-only hotpatch integration (Subsecond). Feature-gated to avoid leaking dev tooling deps
# into normal builds. See ADR 0105.
hotpatch-subsecond = ["dep:serde_json", "dep:subsecond", "dep:tungstenite"]
diag-screenshots = ["dep:serde_json", "dep:image", "dep:fret-diag-protocol"]
wasm-emoji-fonts = ["fret-fonts/emoji"]
wasm-cjk-lite-fonts = ["fret-fonts/cjk-lite"]
# Experimental: per-region hit test passthrough on macOS.
macos-hit-test-regions = ["dep:block2", "objc2-app-kit/block2"]
webview-wry = ["dep:fret-webview", "dep:fret-webview-wry"]

[dependencies]
fret-app = { version = "0.1.0", path = "../fret-app" }
fret-core = { version = "0.1.0", path = "../fret-core" }
fret-fonts = { version = "0.1.0", path = "../fret-fonts" }
fret-render = { version = "0.1.0", path = "../fret-render" }
fret-runtime = { version = "0.1.0", path = "../fret-runtime" }
bytemuck.workspace = true
thiserror.workspace = true
tracing.workspace = true
wgpu.workspace = true
winit.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
anyhow.workspace = true
fret-diag-protocol = { version = "0.1.0", path = "../fret-diag-protocol", optional = true }
fret-platform = { version = "0.1.0", path = "../fret-platform" }
fret-platform-native = { version = "0.1.0", path = "../fret-platform-native" }
fret-runner-winit = { version = "0.1.0", path = "../fret-runner-winit" }
fret-webview = { version = "0.1.0", path = "../fret-webview", optional = true }
fret-webview-wry = { version = "0.1.0", path = "../fret-webview-wry", optional = true }
pollster.workspace = true
slotmap.workspace = true
stacksafe.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
image = { workspace = true, optional = true }
subsecond = { version = "0.7.2", optional = true }
tungstenite = { version = "0.27.0", optional = true }

[target.'cfg(any(target_os = "windows", target_os = "macos", target_os = "linux"))'.dependencies]
renderdog.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
block2 = { version = "0.6.1", optional = true }
keyboard-types.workspace = true
objc.workspace = true
objc2 = { version = "0.6.3", features = ["relax-sign-encoding"] }
objc2-app-kit = { version = "0.3.2", default-features = false, features = ["std", "NSApplication", "NSEvent", "NSMenu", "NSMenuItem", "NSResponder", "NSScreen"] }
objc2-foundation = { version = "0.3.2", default-features = false, features = ["std", "NSArray", "NSGeometry", "NSString", "objc2-core-foundation"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { workspace = true, features = ["Win32_Foundation", "Win32_Graphics_Dwm", "Win32_Storage_FileSystem", "Win32_System_LibraryLoader", "Win32_System_Registry", "Win32_UI_Accessibility", "Win32_UI_WindowsAndMessaging"] }
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D11",
    "Win32_Graphics_Direct3D11on12",
    "Win32_Graphics_Direct3D12",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Media_MediaFoundation",
    "Win32_System_Com",
] }

[target.'cfg(target_os = "linux")'.dependencies]
zbus.workspace = true

[target.'cfg(target_os = "ios")'.dependencies]
block2 = "0.6.1"
objc2 = { version = "0.6.3", features = ["relax-sign-encoding"] }
objc2-core-foundation = { version = "0.3.2", default-features = false, features = ["std", "CFCGTypes"] }
objc2-foundation = { version = "0.3.2", default-features = false, features = ["std", "block2", "NSDictionary", "NSNotification", "NSString", "NSOperation"] }
objc2-ui-kit = { version = "0.3.2", default-features = false, features = ["std", "objc2-core-foundation", "UIApplication", "UIView", "UIWindow", "UIGeometry", "UIResponder"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-platform-web = { version = "0.1.0", path = "../fret-platform-web" }
fret-runner-winit = { version = "0.1.0", path = "../fret-runner-winit" }
fret-runner-web = { version = "0.1.0", path = "../fret-runner-web" }
getrandom = { workspace = true, features = ["wasm_js"] }
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["CssStyleDeclaration", "Document", "Element", "EventTarget", "File", "FilePropertyBag", "HtmlCanvasElement", "HtmlElement", "Location", "MediaQueryList", "MediaQueryListEvent", "Node", "UrlSearchParams", "VisualViewport", "Window", "console"] }
