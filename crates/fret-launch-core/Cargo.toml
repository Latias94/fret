[package]
name = "fret-launch-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Shared launcher/runner API surface for Fret (platform-SDK-free)."

[features]
# Dev-only hotpatch integration (Subsecond). Feature-gated to avoid leaking dev tooling deps
# into normal builds. See ADR 0105.
hotpatch-subsecond = ["dep:subsecond"]

[dependencies]
fret-app = { version = "0.1.0", path = "../fret-app" }
fret-core = { version = "0.1.0", path = "../fret-core" }
fret-runtime = { version = "0.1.0", path = "../fret-runtime" }
fret-render = { version = "0.1.0", path = "../fret-render" }
thiserror.workspace = true
wgpu.workspace = true
winit.workspace = true
subsecond = { version = "0.7.2", optional = true }
