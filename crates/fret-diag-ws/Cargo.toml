[package]
name = "fret-diag-ws"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

[features]
default = []
client-native = ["dep:tungstenite", "dep:url"]
server-native = ["dep:tungstenite", "dep:url"]
client-wasm = ["dep:web-sys", "dep:js-sys", "dep:wasm-bindgen", "dep:wasm-bindgen-futures"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
fret-diag-protocol = { path = "../fret-diag-protocol" }

tungstenite = { version = "0.27.0", optional = true }
url = { version = "2.5.7", optional = true }

js-sys = { version = "0.3", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
web-sys = { version = "0.3", optional = true, features = ["CloseEvent", "ErrorEvent", "Event", "MessageEvent", "WebSocket", "Window", "Location", "UrlSearchParams"] }
