[package]
name = "fret-demo-web"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-core = { path = "../fret-core" }
fret-ui-shadcn = { path = "../../ecosystem/fret-ui-shadcn" }
fret-render = { path = "../fret-render" }
fret-runner-winit = { path = "../fret-runner-winit" }
fret-platform-web = { path = "../fret-platform-web" }
fret-runtime = { path = "../fret-runtime" }
fret-ui-app = { path = "../fret-ui-app" }
fret-fonts = { path = "../fret-fonts" }
winit.workspace = true
wgpu.workspace = true
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = ["Location", "Window", "console"] }
