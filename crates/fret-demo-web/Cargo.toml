[package]
name = "fret-demo-web"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-core = { path = "../fret-core" }
fret-runner-web = { path = "../fret-runner-web" }
fret-runtime = { path = "../fret-runtime" }
fret-ui-app = { path = "../fret-ui-app" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window"] }
