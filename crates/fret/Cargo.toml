[package]
name = "fret"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "The precision fretboard for Rust UI: a GPU-first framework for crisp, fluid application interactions."

[dependencies]
fret-core = { version = "0.1.0", path = "../fret-core", optional = true }
fret-app = { version = "0.1.0", path = "../fret-app", optional = true }
fret-ui = { version = "0.1.0", path = "../fret-ui", optional = true }
fret-runtime = { version = "0.1.0", path = "../fret-runtime", optional = true }
fret-render = { version = "0.1.0", path = "../fret-render", optional = true }
fret-platform = { version = "0.1.0", path = "../fret-platform", optional = true }
fret-platform-native = { version = "0.1.0", path = "../fret-platform-native", optional = true }
fret-platform-web = { version = "0.1.0", path = "../fret-platform-web", optional = true }
fret-runner-winit = { version = "0.1.0", path = "../fret-runner-winit", optional = true }
fret-runner-web = { version = "0.1.0", path = "../fret-runner-web", optional = true }
fret-launch = { version = "0.1.0", path = "../fret-launch", optional = true }
fret-fonts = { version = "0.1.0", path = "../fret-fonts", optional = true }

[features]
default = ["core"]

core = ["dep:fret-core"]
app = ["dep:fret-app", "core"]
ui = ["dep:fret-ui", "core"]
runtime = ["dep:fret-runtime", "core"]
render = ["dep:fret-render", "core"]
fonts = ["dep:fret-fonts"]

platform-contracts = ["dep:fret-platform", "core"]
platform-native = ["dep:fret-platform-native", "platform-contracts"]
platform-web = ["dep:fret-platform-web", "core", "runtime"]

runner-winit = ["dep:fret-runner-winit"]
runner-web = ["dep:fret-runner-web"]
launch = ["dep:fret-launch"]

# Convenience bundles (optional).
native-wgpu = ["launch", "runner-winit", "platform-native", "render", "runtime", "app", "ui"]
web = ["launch", "runner-web", "platform-web", "render", "runtime", "app", "ui", "fonts"]
web-winit = ["launch", "runner-winit", "platform-web", "render", "runtime", "app", "ui", "fonts"]

# Preferred aliases (keep bundle intent clear).
desktop = ["native-wgpu"]
wasm = ["web"]
