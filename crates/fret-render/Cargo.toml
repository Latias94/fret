[package]
name = "fret-render"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Public rendering facade for Fret, re-exporting render contracts and integrations."

[features]
# Default to the wgpu renderer backend, but keep the facade stable so additional backends
# can be introduced via Cargo features (compile-time selection).
default = ["backend-wgpu"]

backend-wgpu = ["dep:fret-render-wgpu"]

[dependencies]
fret-render-wgpu = { version = "0.1.0", path = "../fret-render-wgpu", optional = true }
