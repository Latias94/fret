[package]
name = "fret-platform-web"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-core = { path = "../fret-core" }
fret-runtime = { path = "../fret-runtime" }
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Blob", "Clipboard", "CssStyleDeclaration", "Document", "Event", "EventTarget", "File", "FileList", "HtmlElement", "HtmlInputElement", "Navigator", "Node", "Window"] }

