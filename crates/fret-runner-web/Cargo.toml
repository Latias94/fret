[package]
name = "fret-runner-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Web event loop runner for Fret on wasm32."

[lib]
crate-type = ["rlib"]

[dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-core = { version = "0.1.0", path = "../fret-core" }
fret-platform-web = { version = "0.1.0", path = "../fret-platform-web" }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "Event",
    "EventTarget",
    "HtmlCanvasElement",
    "HtmlElement",
    "KeyboardEvent",
    "Location",
    "PointerEvent",
    "WheelEvent",
    "Window",
] }
