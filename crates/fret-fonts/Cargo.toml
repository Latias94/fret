[package]
name = "fret-fonts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Bundled font assets and loading helpers for Fret."

[dependencies]
fret-assets = { version = "0.1.0", path = "../fret-assets" }

[dev-dependencies]
read-fonts.workspace = true

[features]
# The published crate now always ships the framework-owned baseline subset bundle. Keep the
# historical feature names as compatibility aliases so existing dependency specs still resolve.
default = ["bootstrap-subset"]

# Test-only helpers that convert face manifests into owned byte blobs for deterministic
# renderer/shaper conformance gates. Not intended for production/runtime loading paths.
test-support = []

# Compatibility alias.
bootstrap = ["bootstrap-subset"]

# Compatibility alias for the always-on framework baseline bundle.
bootstrap-subset = []
