[package]
name = "fret-fonts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Bundled font assets and loading helpers for Fret."

[dependencies]

[features]
# The default build includes a minimal UI font bootstrap *subset* set for Web/WASM, plus a
# small CJK subset to avoid "tofu" for common mixed-script UIs.
default = ["bootstrap-subset", "cjk-lite"]

# Compatibility alias.
bootstrap = ["bootstrap-subset"]

# UI sans + UI mono subset (plus legacy mono subset) intended to be fed into `Effect::TextAddFonts`.
bootstrap-subset = []

# Full font files (larger); useful for native debug and for apps that can afford bigger WASM payloads.
bootstrap-full = []

# Optional future bundles (not implemented yet; kept as placeholders for feature gating strategy).
emoji = []
# A "small but useful" CJK font subset intended for Web/WASM bootstrap.
# Generated via `crates/fret-fonts/scripts/subset_cjk_lite.py`.
cjk-lite = []
