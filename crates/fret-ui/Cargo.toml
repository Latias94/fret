[package]
name = "fret-ui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = ["layout-engine-v2"]
layout-engine-v2 = []
compat-policy-shortcuts = []
compat-retained-widgets = []
unstable-retained-bridge = []
diagnostics = []

[dependencies]
fret-core = { path = "../fret-core" }
fret-runtime = { path = "../fret-runtime" }
slotmap.workspace = true
stacksafe.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
taffy = { workspace = true, features = ["flexbox", "grid"] }
virtualizer.workspace = true
unicode-segmentation.workspace = true
unicode-ident.workspace = true
