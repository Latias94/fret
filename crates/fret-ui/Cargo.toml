[package]
name = "fret-ui"
version.workspace = true
edition.workspace = true

[features]
default = []
# Legacy retained widgets that are being phased out in favor of `fret-components-ui` and
# declarative authoring (ADR 0037).
legacy-widgets = []

[dependencies]
fret-core = { path = "../fret-core" }
fret-runtime = { path = "../fret-runtime" }
slotmap.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
taffy = { workspace = true, features = ["flexbox", "grid"] }
