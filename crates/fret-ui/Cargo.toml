[package]
name = "fret-ui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Mechanism-layer UI engine for Fret with tree, layout, focus, routing, and interaction contracts."

[features]
default = []
compat-policy-shortcuts = []
compat-retained-widgets = []
unstable-retained-bridge = []
diagnostics = []

[dependencies]
fret-core = { version = "0.1.0", path = "../fret-core" }
fret-runtime = { version = "0.1.0", path = "../fret-runtime" }
slotmap.workspace = true
smallvec.workspace = true
stacksafe.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
taffy = { workspace = true, features = ["flexbox", "grid"] }
virtualizer.workspace = true
unicode-segmentation.workspace = true
unicode-ident.workspace = true
