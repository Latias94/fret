[package]
name = "fret-imui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
state-query = ["fret-authoring/query"]
state-selector = ["fret-authoring/selector"]
state = ["state-selector", "state-query"]
# Backward-compatible aliases (to be deprecated later)
query = ["state-query"]
selector = ["state-selector"]

[dependencies]
fret-authoring = { path = "../fret-authoring" }
fret-ui = { path = "../../crates/fret-ui" }

[dev-dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["imui"] }
