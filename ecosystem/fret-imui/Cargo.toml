[package]
name = "fret-imui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
state-query = ["fret-authoring/query"]
state-selector = ["fret-authoring/selector"]
state = ["state-selector", "state-query"]

[dependencies]
fret-authoring = { path = "../fret-authoring" }
fret-ui = { path = "../../crates/fret-ui" }

[dev-dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["imui"] }
slotmap.workspace = true

[lints.clippy]
arc_with_non_send_sync = "allow"
bool_assert_comparison = "allow"
default_constructed_unit_structs = "allow"
redundant_closure = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
