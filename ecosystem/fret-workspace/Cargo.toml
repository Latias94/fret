[package]
name = "fret-workspace"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

[features]
default = ["shadcn-context-menu"]
serde = ["dep:serde"]
shadcn-context-menu = ["dep:fret-ui-shadcn"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-dnd = { path = "../fret-dnd" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-headless = { path = "../fret-ui-headless" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["dnd"] }
fret-ui-shadcn = { path = "../fret-ui-shadcn", optional = true }
serde = { workspace = true, optional = true, features = ["rc"] }

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }

[lints.clippy]
arc_with_non_send_sync = "allow"
duplicated_attributes = "allow"
field_reassign_with_default = "allow"
needless_update = "allow"
question_mark = "allow"
redundant_locals = "allow"
should_implement_trait = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
