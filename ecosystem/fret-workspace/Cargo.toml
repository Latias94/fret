[package]
name = "fret-workspace"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

[features]
serde = ["dep:serde"]
shadcn-context-menu = ["dep:fret-ui-shadcn"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-shadcn = { path = "../fret-ui-shadcn", optional = true }
serde = { workspace = true, optional = true, features = ["rc"] }
