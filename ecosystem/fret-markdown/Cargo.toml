[package]
name = "fret-markdown"
version.workspace = true
edition.workspace = true

[features]
default = []

syntax-rust = ["fret-syntax/lang-rust"]
syntax-all = ["fret-syntax/tree-sitter-languages"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-syntax = { path = "../fret-syntax", default-features = false }
pulldown-cmark.workspace = true
