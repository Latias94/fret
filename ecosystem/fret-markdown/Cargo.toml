[package]
name = "fret-markdown"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = ["mermaid"]

ui = []
imui = ["ui", "dep:fret-authoring"]

syntax-rust = ["fret-code-view/syntax-rust"]
syntax-all = ["fret-code-view/syntax-all"]
mathjax-svg = ["dep:mathjax_svg", "dep:fret-query", "fret-query/ui"]
mermaid = ["dep:merman", "dep:fret-query", "fret-query/ui"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-ui = { path = "../../crates/fret-ui" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-authoring = { path = "../fret-authoring", optional = true }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-code-view = { path = "../fret-code-view", default-features = false }
fret-query = { path = "../fret-query", optional = true }
pulldown-cmark.workspace = true
mdstream = { workspace = true, features = ["pulldown"] }
mathjax_svg = { workspace = true, optional = true }
tracing.workspace = true
merman = { path = "../../../merman/crates/merman", default-features = false, features = ["render"], optional = true }
