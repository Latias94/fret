[package]
name = "fret-markdown"
version.workspace = true
edition.workspace = true

[features]
default = []

syntax-rust = ["fret-code-view/syntax-rust"]
syntax-all = ["fret-code-view/syntax-all"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-code-view = { path = "../fret-code-view", default-features = false }
pulldown-cmark.workspace = true
mdstream = { workspace = true, features = ["pulldown"] }
