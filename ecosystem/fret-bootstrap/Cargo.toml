[package]
name = "fret-bootstrap"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
# Enable `preload_icon_svgs_on_gpu_ready`, which depends on `fret-ui-kit`.
preload-icon-svgs = ["dep:fret-ui-kit", "fret-ui-kit/icons", "dep:fret-canvas"]
ui-assets = ["dep:fret-ui-assets", "fret-ui-assets/app-integration"]
# Convenience icon pack installers (data-only).
icons-lucide = ["dep:fret-icons-lucide", "fret-icons-lucide/app-integration"]
icons-radix = ["dep:fret-icons-radix", "fret-icons-radix/app-integration"]
hotpatch-subsecond = ["fret-launch/hotpatch-subsecond", "dep:subsecond"]
ui-app-driver = [
  "dep:fret-runtime",
  "dep:fret-ui",
  "fret-ui/diagnostics",
  "dep:fret-ui-app",
  "dep:fret-ui-kit",
]
ui-app-command-palette = ["ui-app-driver", "dep:fret-ui-shadcn"]
tracing = ["dep:tracing", "dep:tracing-subscriber"]
tracy = ["tracing", "dep:tracing-tracy"]
diagnostics = ["tracing", "dep:fret-canvas", "fret-launch/diag-screenshots"]

[dependencies]
thiserror.workspace = true
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true, features = ["env-filter"] }
tracing-tracy = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
slotmap.workspace = true

fret-app = { path = "../../crates/fret-app" }
fret-core = { path = "../../crates/fret-core" }
fret-i18n = { path = "../../crates/fret-i18n" }
fret-runtime = { path = "../../crates/fret-runtime", optional = true }
fret-icons = { path = "../fret-icons" }
fret-launch = { path = "../../crates/fret-launch" }
fret-render = { path = "../../crates/fret-render" }
fret-ui = { path = "../../crates/fret-ui", optional = true }
fret-ui-app = { path = "../../crates/fret-ui-app", optional = true }
fret-canvas = { path = "../fret-canvas", optional = true }

fret-i18n-fluent = { path = "../fret-i18n-fluent" }
fret-ui-kit = { path = "../fret-ui-kit", optional = true }
fret-ui-shadcn = { path = "../fret-ui-shadcn", optional = true }
fret-ui-assets = { path = "../fret-ui-assets", optional = true }
fret-icons-lucide = { path = "../fret-icons-lucide", optional = true }
fret-icons-radix = { path = "../fret-icons-radix", optional = true }
subsecond = { version = "0.7.2", optional = true }
