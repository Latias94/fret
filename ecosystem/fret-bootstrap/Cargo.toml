[package]
name = "fret-bootstrap"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Golden-path bootstrap utilities and app defaults for the Fret UI framework."

[features]
default = []
# Enable `preload_icon_svgs_on_gpu_ready`, which depends on `fret-ui-kit`.
preload-icon-svgs = ["dep:fret-ui-kit", "fret-ui-kit/icons", "dep:fret-canvas"]
ui-assets = ["dep:fret-ui-assets", "fret-ui-assets/app-integration"]
# Convenience icon pack installers (data-only).
icons-lucide = ["dep:fret-icons-lucide", "fret-icons-lucide/app-integration"]
icons-radix = ["dep:fret-icons-radix", "fret-icons-radix/app-integration"]
# Select a single provider for semantic `ui.*` icon aliases.
icons-ui-semantic-lucide = ["icons-lucide", "fret-icons-lucide/semantic-ui"]
icons-ui-semantic-radix = ["icons-radix", "fret-icons-radix/semantic-ui"]
hotpatch-subsecond = ["fret-launch/hotpatch-subsecond", "dep:subsecond"]
ui-app-driver = [
  "dep:fret-runtime",
  "dep:fret-ui",
  "fret-ui/diagnostics",
  "dep:fret-ui-app",
  "dep:fret-ui-kit",
]
ui-app-command-palette = ["ui-app-driver", "dep:fret-ui-shadcn"]
window-style-profiles = ["dep:fret-window-style-profiles"]
tracing = ["dep:tracing", "dep:tracing-subscriber"]
tracy = ["tracing", "dep:tracing-tracy"]
diagnostics = ["tracing", "dep:fret-canvas", "dep:fret-query", "fret-launch/diag-screenshots"]
diagnostics-ws = ["diagnostics", "dep:fret-diag-ws"]

[dependencies]
thiserror.workspace = true
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true, features = ["env-filter"] }
tracing-tracy = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
slotmap.workspace = true
blake3.workspace = true

fret-app = { version = "0.1.0", path = "../../crates/fret-app" }
fret-assets = { version = "0.1.0", path = "../../crates/fret-assets" }
fret-core = { version = "0.1.0", path = "../../crates/fret-core" }
fret-i18n = { version = "0.1.0", path = "../../crates/fret-i18n" }
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime", optional = true }
fret-window-style-profiles = { version = "0.1.0", path = "../fret-window-style-profiles", optional = true }
fret-icons = { version = "0.1.0", path = "../fret-icons" }
fret-launch = { version = "0.1.0", path = "../../crates/fret-launch" }
fret-render = { version = "0.1.0", path = "../../crates/fret-render" }
fret-diag-protocol = { version = "0.1.0", path = "../../crates/fret-diag-protocol" }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui", optional = true }
fret-ui-app = { version = "0.1.0", path = "../../crates/fret-ui-app", optional = true }
fret-canvas = { version = "0.1.0", path = "../fret-canvas", optional = true }
fret-query = { version = "0.1.0", path = "../fret-query", optional = true }

fret-i18n-fluent = { version = "0.1.0", path = "../fret-i18n-fluent" }
fret-ui-kit = { version = "0.1.0", path = "../fret-ui-kit", optional = true }
fret-ui-shadcn = { version = "0.1.0", path = "../fret-ui-shadcn", optional = true }
fret-ui-assets = { version = "0.1.0", path = "../fret-ui-assets", optional = true }
fret-icons-lucide = { version = "0.1.0", path = "../fret-icons-lucide", optional = true, default-features = false }
fret-icons-radix = { version = "0.1.0", path = "../fret-icons-radix", optional = true, default-features = false }
subsecond = { version = "0.7.2", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-diag-ws = { version = "0.1.0", path = "../../crates/fret-diag-ws", optional = true, default-features = false, features = ["client-native"] }

[target.'cfg(windows)'.dependencies]
windows-sys.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-diag-ws = { version = "0.1.0", path = "../../crates/fret-diag-ws", optional = true, default-features = false, features = ["client-wasm"] }
