[package]
name = "fret-bootstrap"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
# Enable `preload_icon_svgs_on_gpu_ready`, which depends on `fret-ui-kit`.
preload-icon-svgs = ["dep:fret-ui-kit"]
# Marker feature used by app crates; kept to avoid workspace feature drift.
ui-app-driver = []

[dependencies]
thiserror.workspace = true

fret-app = { path = "../../crates/fret-app" }
fret-core = { path = "../../crates/fret-core" }
fret-icons = { path = "../fret-icons" }
fret-launch = { path = "../../crates/fret-launch" }
fret-render = { path = "../../crates/fret-render" }

fret-ui-kit = { path = "../fret-ui-kit", optional = true }
