[package]
name = "fret-bootstrap-diag-ws"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Thin fret-bootstrap bridge for diagnostics WebSocket transport."

[dependencies]
fret-diag-protocol = { version = "0.1.0", path = "../../crates/fret-diag-protocol" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
fret-diag-ws = { version = "0.1.0", path = "../../crates/fret-diag-ws", default-features = false, features = ["client-native"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
fret-diag-ws = { version = "0.1.0", path = "../../crates/fret-diag-ws", default-features = false, features = ["client-wasm"] }

[lints.clippy]
arc_with_non_send_sync = "allow"
field_reassign_with_default = "allow"
if_same_then_else = "allow"
manual_clamp = "allow"
match_like_matches_macro = "allow"
ptr_arg = "allow"
question_mark = "allow"
suspicious_open_options = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
