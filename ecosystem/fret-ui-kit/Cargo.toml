[package]
name = "fret-ui-kit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-dnd = { path = "../fret-dnd", optional = true }
fret-ui-headless = { path = "../fret-ui-headless" }
fret-ui-primitives = { path = "../fret-ui-primitives" }
fret-viewport-tooling = { path = "../fret-viewport-tooling" }
fret-canvas = { path = "../fret-canvas", optional = true, features = ["ui"] }
fret-icons = { path = "../fret-icons", optional = true }
tracing.workspace = true
time.workspace = true
virtualizer.workspace = true

[features]
# Default to a minimal, third-party-friendly foundation surface.
default = []

# Headless drag-and-drop policy toolbox integration.
dnd = ["dep:fret-dnd"]

# Exposes internal overlay orchestration modules directly. Prefer `OverlayController` instead.
unstable-internals = []

# Opt-in helpers that integrate with the shared icon registry (`fret-icons`).
icons = ["dep:fret-icons"]

# Opinionated declarative helpers that are closer to "recipes" than substrate.
recipes = ["icons", "dep:fret-canvas"]

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
serde.workspace = true
serde_json.workspace = true
slotmap.workspace = true
