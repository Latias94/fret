[package]
name = "fret-ui-kit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Component authoring toolkit for Fret with declarative policies and reusable building blocks."

[dependencies]
fret-core = { version = "0.1.0", path = "../../crates/fret-core" }
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime" }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui" }
fret-authoring = { version = "0.1.0", path = "../fret-authoring", optional = true }
fret-dnd = { version = "0.1.0", path = "../fret-dnd", optional = true }
fret-interaction = { version = "0.1.0", path = "../fret-interaction", optional = true, features = ["runtime"] }
fret-ui-headless = { version = "0.1.0", path = "../fret-ui-headless" }
fret-viewport-tooling = { version = "0.1.0", path = "../fret-viewport-tooling" }
fret-canvas = { version = "0.1.0", path = "../fret-canvas", optional = true, features = ["ui"] }
fret-icons = { version = "0.1.0", path = "../fret-icons", optional = true }
tracing.workspace = true
time.workspace = true
virtualizer.workspace = true
smallvec.workspace = true

[features]
# Default to a minimal, third-party-friendly foundation surface.
default = []

# Optional integration helpers for immediate-mode authoring frontends (`fret-imui` via `UiWriter`).
imui = ["dep:fret-authoring", "dep:fret-interaction"]

# Optional state adapter naming convention (v1):
# - `state-selector`: selector-based derived-state adapters
# - `state-query`: query-based async-state adapters
# - `state`: umbrella feature enabling both
state-selector = []
state-query = []
state = ["state-selector", "state-query"]

# Headless drag-and-drop policy toolbox integration.
dnd = ["dep:fret-dnd"]

# Exposes internal overlay orchestration modules directly. Prefer `OverlayController` instead.
unstable-internals = []

# Opt-in helpers that integrate with the shared icon registry (`fret-icons`).
icons = ["dep:fret-icons"]

# Opinionated declarative helpers that are closer to "recipes" than substrate.
recipes = ["icons", "dep:fret-canvas"]

[dev-dependencies]
fret-app = { version = "0.1.0", path = "../../crates/fret-app" }
serde.workspace = true
serde_json.workspace = true
slotmap.workspace = true
