[package]
name = "fret-ui-kit"
version.workspace = true
edition.workspace = true

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-icons = { path = "../fret-icons", optional = true }
tracing.workspace = true

[features]
# Default to a minimal, third-party-friendly foundation surface.
default = []

# Exposes internal overlay orchestration modules directly. Prefer `OverlayController` instead.
unstable-internals = []

# Opt-in helpers that integrate with the shared icon registry (`fret-icons`).
icons = ["dep:fret-icons"]

# Opinionated declarative helpers that are closer to "recipes" than substrate.
recipes = ["icons"]

# TanStack-inspired headless table engine (`headless::table`).
table = []

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
