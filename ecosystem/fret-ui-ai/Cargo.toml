[package]
name = "fret-ui-ai"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
webview = ["dep:fret-webview"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-ui-shadcn = { path = "../fret-ui-shadcn" }
fret-icons = { path = "../fret-icons" }
fret-markdown = { path = "../fret-markdown" }
fret-code-view = { path = "../fret-code-view" }
fret-canvas = { path = "../fret-canvas", features = ["ui"] }
fret-webview = { path = "../../crates/fret-webview", optional = true }
serde_json.workspace = true
serde.workspace = true

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
