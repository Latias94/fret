[package]
name = "fret-ui-ai"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
webview = ["dep:fret-webview"]

[dependencies]
fret-assets = { path = "../../crates/fret-assets" }
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-assets = { path = "../fret-ui-assets", features = ["ui", "image-decode"] }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-ui-shadcn = { path = "../fret-ui-shadcn" }
fret-icons = { path = "../fret-icons" }
fret-markdown = { path = "../fret-markdown" }
fret-code-view = { path = "../fret-code-view" }
fret-canvas = { path = "../fret-canvas", features = ["ui"] }
fret-webview = { path = "../../crates/fret-webview", optional = true }
serde_json.workspace = true
serde.workspace = true

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }

[lints.clippy]
arc_with_non_send_sync = "allow"
field_reassign_with_default = "allow"
large_enum_variant = "allow"
manual_strip = "allow"
question_mark = "allow"
redundant_locals = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_find_map = "allow"
