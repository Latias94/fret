[package]
name = "fret-canvas"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Canvas and node-graph substrate for interactive Fret tooling."

[features]
default = []

# UI integration helpers (declarative wiring + recipes).
#
# This is intentionally feature-gated so `fret-canvas` can remain a lightweight, portable substrate
# by default. When enabled, this pulls in `fret-ui` + `fret-runtime` for declarative integration.
ui = ["dep:fret-ui", "dep:fret-runtime"]

# Reserved for a future declarative canvas element surface (ADR 0137).
declarative = []

# Optional spatial index backend.
rstar = ["dep:rstar"]

# Optional geometry backend for hit-testing and path ops (ADR 0167).
kurbo = ["dep:kurbo"]

[dependencies]
fret-core = { version = "0.1.0", path = "../../crates/fret-core" }
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime", optional = true }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui", optional = true }
rstar = { workspace = true, optional = true }
kurbo = { workspace = true, optional = true }
