[package]
name = "fret-ui-literals"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Declarative literal helpers for Fret UI and runtime (JSON-backed configs and ergonomic builders)."

[features]
default = []
# Optional `ElementContext` sugar (ViewCache-safe observation), consistent with other ecosystem crates.
ui = ["dep:fret-ui"]

[dependencies]
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime" }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui", optional = true }
serde.workspace = true
serde_json.workspace = true
