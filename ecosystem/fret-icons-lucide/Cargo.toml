[package]
name = "fret-icons-lucide"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Lucide icon pack integration for Fret (embedded SVGs + optional app registry wiring)."

[features]
default = ["semantic-ui"]
semantic-ui = []
app-integration = ["dep:fret-app", "dep:fret-core"]

[dependencies]
fret-icons = { version = "0.1.0", path = "../fret-icons" }
fret-app = { version = "0.1.0", path = "../../crates/fret-app", optional = true }
fret-core = { version = "0.1.0", path = "../../crates/fret-core", optional = true }
rust-embed.workspace = true
