[package]
name = "fret-chart"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
echarts = ["dep:serde", "dep:serde_json"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-ui = { path = "../../crates/fret-ui", features = ["unstable-retained-bridge"] }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-canvas = { path = "../fret-canvas" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["recipes"] }
delinea = { path = "../delinea" }
slotmap.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
