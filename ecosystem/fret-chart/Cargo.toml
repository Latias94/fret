[package]
name = "fret-chart"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
echarts = ["dep:serde", "dep:serde_json"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-ui = { path = "../../crates/fret-ui", features = ["unstable-retained-bridge"] }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-canvas = { path = "../fret-canvas", features = ["ui"] }
fret-ui-kit = { path = "../fret-ui-kit", features = ["recipes"] }
delinea = { path = "../delinea" }
slotmap.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }

[lints.clippy]
arc_with_non_send_sync = "allow"
field_reassign_with_default = "allow"
if_same_then_else = "allow"
large_enum_variant = "allow"
manual_clamp = "allow"
needless_range_loop = "allow"
neg_cmp_op_on_partial_ord = "allow"
too_many_arguments = "allow"
