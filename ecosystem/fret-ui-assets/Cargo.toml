[package]
name = "fret-ui-assets"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
# Optional integration helpers that wire `UiAssets` into `fret-app`-based applications.
app-integration = ["dep:fret-app"]
# Optional `ElementContext` sugar (ViewCache-safe observation), consistent with other ecosystem crates.
ui = ["dep:fret-ui"]
# Optional integration with `fret-query` (ergonomics only; baseline image loading must not require it).
query-integration = ["dep:fret-query"]
image-decode = ["dep:image"]
image-metadata = ["dep:fret-ui-kit"]

[dependencies]
fret-asset-cache = { path = "../fret-asset-cache" }
fret-executor = { path = "../fret-executor" }
fret-app = { path = "../../crates/fret-app", optional = true }
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui", optional = true }
fret-query = { path = "../fret-query", optional = true }
fret-ui-kit = { path = "../fret-ui-kit", optional = true }
image = { workspace = true, optional = true }
tracing.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Response"] }

[dev-dependencies]
slotmap.workspace = true
