[package]
name = "fret-ui-shadcn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Shadcn/ui-inspired component set and recipes for Fret."

[features]
default = []
app-integration = ["dep:fret-app"]
chart = ["dep:fret-chart"]
executor-integration = ["dep:fret-executor"]
state-selector = ["dep:fret-selector", "fret-selector/ui"]
state-query = ["dep:fret-query"]
state = ["state-selector", "state-query"]
web-goldens = []

[dependencies]
fret-core = { version = "0.1.0", path = "../../crates/fret-core" }
fret-app = { version = "0.1.0", path = "../../crates/fret-app", optional = true }
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime" }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui" }
fret-ui-headless = { version = "0.1.0", path = "../fret-ui-headless" }
fret-ui-kit = { version = "0.1.0", path = "../fret-ui-kit", features = ["icons", "dnd"] }
fret-chart = { version = "0.1.0", path = "../fret-chart", optional = true }
fret-icons = { version = "0.1.0", path = "../fret-icons" }
fret-executor = { version = "0.1.0", path = "../fret-executor", optional = true }
fret-query = { version = "0.1.0", path = "../fret-query", optional = true }
fret-selector = { version = "0.1.0", path = "../fret-selector", optional = true }
serde.workspace = true
serde_json.workspace = true
time.workspace = true

[dev-dependencies]
fret-app = { version = "0.1.0", path = "../../crates/fret-app" }
fret-ui-app = { version = "0.1.0", path = "../../crates/fret-ui-app" }
slotmap.workspace = true

[lints.clippy]
arc_with_non_send_sync = "allow"
collapsible_if = "allow"
default_constructed_unit_structs = "allow"
enum_variant_names = "allow"
field_reassign_with_default = "allow"
if_same_then_else = "allow"
large_enum_variant = "allow"
manual_clamp = "allow"
needless_lifetimes = "allow"
needless_update = "allow"
ok_expect = "allow"
question_mark = "allow"
redundant_locals = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_unwrap = "allow"

[lints.rust]
dead_code = "allow"
