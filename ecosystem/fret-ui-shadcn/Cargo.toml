[package]
name = "fret-ui-shadcn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
app-integration = ["dep:fret-app"]
tanstack-table = ["fret-ui-kit/table"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-app = { path = "../../crates/fret-app", optional = true }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["icons"] }
fret-icons = { path = "../fret-icons" }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
