[package]
name = "fret"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Batteries-included meta crate for the Fret UI framework (golden path entry point)."

[features]
# Desktop-first defaults.
default = [
    "desktop",
    "app",
]

# “Works out of the box” ecosystem bundle (within the enabled platform features).
batteries = [
    "app",
    "state",
    "diagnostics",
    "config-files",
    "ui-assets",
    "icons",
    "preload-icon-svgs",
]

# Recommended “just build an app” baseline: shadcn-first.
#
# Intentionally excludes:
# - `diagnostics` (pulls in extra dev tooling; opt-in)
# - `state` (selector/query helpers; opt-in)
# - `config-files` (filesystem side effects; opt-in)
# - `ui-assets` (image/SVG caches; opt-in)
# - `preload-icon-svgs` (GPU-time cost; opt-in)
# - `command-palette` (policy; opt-in)
app = [
    "shadcn",
]

# Derived + async state helpers used by `AppUi`.
state = ["state-selector", "state-query"]
state-selector = ["dep:fret-selector", "fret-selector/ui"]
state-query = ["dep:fret-query", "fret-query/ui", "fret-ui-kit/state-query"]
docking = ["dep:fret-docking"]
router = [
    "dep:fret-router",
    "dep:fret-router-ui",
    "fret-router/query-integration",
    "fret-router/web-history",
    "fret-router/hash-routing",
]

# Load layered config files by default (`.fret/settings.json`, `.fret/keymap.json`, `.fret/menubar.json`).
# Disable for embedding/minimal builds that must not touch the filesystem.
config-files = []

# Compile the native desktop runner stack (winit + wgpu) via the framework facade bundles.
desktop = [
    "dep:fret-framework",
    "dep:wgpu",
    "fret-framework/native-wgpu",
    "fret-bootstrap/ui-app-driver",
]

# Dev-only iteration helpers (fast restart state restore, etc).
devloop = ["fret-launch/dev-state"]

# Common app/dev conveniences (still optional; users can disable for minimal builds).
diagnostics = ["fret-bootstrap/diagnostics"]
tracing = ["fret-bootstrap/tracing"]

# Ecosystem integrations.
shadcn = ["dep:fret-ui-shadcn"]
ui-assets = ["fret-bootstrap/ui-assets"]
icons = [
    "fret-bootstrap/icons-lucide",
    "fret-bootstrap/icons-ui-semantic-lucide",
    "fret-ui-kit/icons",
]
preload-icon-svgs = ["fret-bootstrap/preload-icon-svgs"]
command-palette = ["fret-bootstrap/ui-app-command-palette"]

[dependencies]
thiserror.workspace = true

# Re-exported stable surface for kernel/backends (advanced assembly surface).
fret-framework = { version = "0.1.0", path = "../../crates/fret-framework", package = "fret-framework", optional = true, default-features = false }

# Golden-path wiring and optional ecosystem integrations.
fret-assets = { version = "0.1.0", path = "../../crates/fret-assets" }
fret-bootstrap = { version = "0.1.0", path = "../fret-bootstrap", default-features = false }
fret-docking = { version = "0.1.0", path = "../fret-docking", optional = true }
fret-icons = { version = "0.1.0", path = "../fret-icons" }
fret-query = { version = "0.1.0", path = "../fret-query", optional = true }
fret-router = { version = "0.1.0", path = "../fret-router", optional = true }
fret-router-ui = { version = "0.1.0", path = "../fret-router-ui", optional = true }
fret-selector = { version = "0.1.0", path = "../fret-selector", optional = true }
fret-ui-shadcn = { version = "0.1.0", path = "../fret-ui-shadcn", optional = true, features = ["app-integration"] }
fret-ui-kit = { version = "0.1.0", path = "../fret-ui-kit" }

# Used by the public signatures and error types.
fret-app = { version = "0.1.0", path = "../../crates/fret-app" }
fret-core = { version = "0.1.0", path = "../../crates/fret-core" }
fret-launch = { version = "0.1.0", path = "../../crates/fret-launch" }
fret-runtime = { version = "0.1.0", path = "../../crates/fret-runtime" }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui" }
fret-workspace = { version = "0.1.0", path = "../fret-workspace" }
wgpu = { workspace = true, optional = true }

[dev-dependencies]
slotmap.workspace = true
