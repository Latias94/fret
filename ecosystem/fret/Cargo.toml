[package]
name = "fret"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[features]
# Desktop-first, batteries-included defaults.
default = [
    "desktop",
    "batteries",
]

# “Works out of the box” ecosystem bundle (within the enabled platform features).
batteries = [
    "config-files",
    "diagnostics",
    "ui-assets",
    "icons-lucide",
    "preload-icon-svgs",
    "shadcn",
]

# Load layered config files by default (`.fret/settings.json`, `.fret/keymap.json`, `.fret/menubar.json`).
# Disable for embedding/minimal builds that must not touch the filesystem.
config-files = []

# Compile the native desktop runner stack (winit + wgpu) via the framework facade bundles.
desktop = [
    "dep:fret-framework",
    "dep:wgpu",
    "fret-framework/native-wgpu",
    "fret-bootstrap/ui-app-driver",
]

# Dev-only iteration helpers (fast restart state restore, etc).
devloop = ["fret-launch/dev-state"]

# Common app/dev conveniences (still optional; users can disable for minimal builds).
diagnostics = ["fret-bootstrap/diagnostics"]
tracing = ["fret-bootstrap/tracing"]

# Ecosystem integrations.
shadcn = ["dep:fret-ui-shadcn"]
ui-assets = ["fret-bootstrap/ui-assets"]
icons-lucide = [
    "fret-bootstrap/icons-lucide",
    "fret-bootstrap/icons-ui-semantic-lucide",
    "fret-ui-kit/icons",
]
icons-radix = [
    "fret-bootstrap/icons-radix",
    "fret-bootstrap/icons-ui-semantic-radix",
    "fret-ui-kit/icons",
]
# Vendor namespaces only (no `ui.*` semantic aliases).
icons-lucide-vendor = ["fret-bootstrap/icons-lucide", "fret-ui-kit/icons"]
icons-radix-vendor = ["fret-bootstrap/icons-radix", "fret-ui-kit/icons"]
# Select a single provider for semantic `ui.*` icon aliases.
icons-ui-semantic-lucide = ["icons-lucide-vendor", "fret-bootstrap/icons-ui-semantic-lucide"]
icons-ui-semantic-radix = ["icons-radix-vendor", "fret-bootstrap/icons-ui-semantic-radix"]
preload-icon-svgs = ["fret-bootstrap/preload-icon-svgs"]
command-palette = ["fret-bootstrap/ui-app-command-palette"]
workspace-shell = ["dep:fret-workspace", "fret-workspace/shadcn-context-menu", "shadcn"]
router = ["dep:fret-router-ui"]

[dependencies]
thiserror.workspace = true

# Re-exported stable surface for kernel/backends (advanced assembly surface).
fret-framework = { path = "../../crates/fret-framework", package = "fret-framework", optional = true, default-features = false }

# Golden-path wiring and optional ecosystem integrations.
fret-bootstrap = { path = "../fret-bootstrap", default-features = false }
fret-icons = { path = "../fret-icons" }
fret-router-ui = { path = "../fret-router-ui", optional = true }
fret-ui-shadcn = { path = "../fret-ui-shadcn", optional = true, features = ["app-integration"] }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-workspace = { path = "../fret-workspace", optional = true }

# Used by the public signatures and error types.
fret-app = { path = "../../crates/fret-app" }
fret-core = { path = "../../crates/fret-core" }
fret-launch = { path = "../../crates/fret-launch" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
wgpu = { workspace = true, optional = true }

[dev-dependencies]
slotmap.workspace = true
