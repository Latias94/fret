[package]
name = "fret-code-editor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []

syntax = ["dep:fret-syntax"]
syntax-all = ["syntax", "fret-syntax/tree-sitter-languages"]
syntax-rust = ["syntax", "fret-syntax/lang-rust"]
syntax-markdown = ["syntax", "fret-syntax/lang-md"]

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-kit = { path = "../fret-ui-kit" }
fret-code-editor-buffer = { path = "../fret-code-editor-buffer" }
fret-code-editor-view = { path = "../fret-code-editor-view" }
fret-syntax = { path = "../fret-syntax", default-features = false, optional = true }
fret-undo = { path = "../fret-undo" }

[lints.rust]
unused_mut = "allow"

[lints.clippy]
collapsible_if = "allow"
default_constructed_unit_structs = "allow"
if_same_then_else = "allow"
let_and_return = "allow"
needless_borrow = "allow"
question_mark = "allow"
reserve_after_initialization = "allow"
type_complexity = "allow"
unnecessary_map_or = "allow"
unnecessary_lazy_evaluations = "allow"
