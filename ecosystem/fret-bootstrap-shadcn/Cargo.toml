[package]
name = "fret-bootstrap-shadcn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Thin shadcn recipe integrations for fret-bootstrap."

[dependencies]
fret-app = { version = "0.1.0", path = "../../crates/fret-app" }
fret-bootstrap = { version = "0.1.0", path = "../fret-bootstrap", features = ["ui-app-command-palette"] }
fret-ui = { version = "0.1.0", path = "../../crates/fret-ui" }
fret-ui-kit = { version = "0.1.0", path = "../fret-ui-kit" }
fret-ui-shadcn = { version = "0.1.0", path = "../fret-ui-shadcn" }

[lints.clippy]
arc_with_non_send_sync = "allow"
field_reassign_with_default = "allow"
if_same_then_else = "allow"
manual_clamp = "allow"
match_like_matches_macro = "allow"
ptr_arg = "allow"
question_mark = "allow"
suspicious_open_options = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
