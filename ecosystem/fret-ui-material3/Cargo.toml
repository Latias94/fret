[package]
name = "fret-ui-material3"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
state-selector = []
state-query = []
state = ["state-selector", "state-query"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-icons = { path = "../fret-icons" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-headless = { path = "../fret-ui-headless" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["icons"] }
material-colors.workspace = true
serde.workspace = true
time.workspace = true

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
serde_json.workspace = true

[lints.clippy]
arc_with_non_send_sync = "allow"
field_reassign_with_default = "allow"
large_enum_variant = "allow"
manual_clamp = "allow"
question_mark = "allow"
too_many_arguments = "allow"
