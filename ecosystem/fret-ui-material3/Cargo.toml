[package]
name = "fret-ui-material3"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
state-selector = []
state-query = []
state = ["state-selector", "state-query"]

[dependencies]
fret-core = { path = "../../crates/fret-core" }
fret-icons = { path = "../fret-icons" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui" }
fret-ui-headless = { path = "../fret-ui-headless" }
fret-ui-kit = { path = "../fret-ui-kit", features = ["icons"] }
material-colors.workspace = true
serde.workspace = true
time.workspace = true

[dev-dependencies]
fret-app = { path = "../../crates/fret-app" }
fret-fonts = { path = "../../crates/fret-fonts", features = ["emoji"] }
fret-render-text = { path = "../../crates/fret-render-text" }
serde_json.workspace = true
