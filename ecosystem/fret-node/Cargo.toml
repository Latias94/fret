[package]
name = "fret-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
fret-canvas = { path = "../fret-canvas", optional = true }
fret-app = { path = "../../crates/fret-app", optional = true }
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime", optional = true }
fret-ui = { path = "../../crates/fret-ui", optional = true, features = ["unstable-retained-bridge"] }
fret-authoring = { path = "../fret-authoring", optional = true }
fret-ui-kit = { path = "../fret-ui-kit", optional = true, default-features = false, features = ["dnd"] }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true
tracing.workspace = true
slotmap.workspace = true

[features]
default = ["fret-ui", "kit"]

# Convention-aligned feature aliases:
# - `ui` implies the existing `fret-ui` integration surface.
# - `imui` adds immediate-mode authoring adapters on top of `ui`.
ui = ["fret-ui"]
imui = ["ui", "dep:fret-authoring"]

# Enables integration helpers for `crates/fret-ui` (canvas widget, action hooks, styling surfaces).
fret-ui = ["dep:fret-ui", "dep:fret-runtime", "dep:fret-canvas", "dep:fret-ui-kit"]

# Opt into the `rstar` spatial index backend for large graphs.
canvas-rstar = ["fret-ui", "fret-canvas/rstar"]

# Convenience surfaces (profiles + common recipes) built on top of the substrate.
#
# This is headless-safe: it must not depend on `fret-ui`.
kit = []

# Optional integration helpers for `fret-app` applications (command registration + default keybindings).
app-integration = ["dep:fret-app"]

# Builds only the headless graph model + schema + rules (no `fret-ui` dependency).
headless = []
