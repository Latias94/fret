[package]
name = "fret-plot"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []

ui = []
imui = ["ui", "dep:fret-authoring"]

[dependencies]
fret-canvas = { path = "../fret-canvas" }
fret-core = { path = "../../crates/fret-core" }
fret-runtime = { path = "../../crates/fret-runtime" }
fret-ui = { path = "../../crates/fret-ui", features = ["unstable-retained-bridge"] }
slotmap.workspace = true
fret-ui-kit = { path = "../fret-ui-kit" }
fret-authoring = { path = "../fret-authoring", optional = true }

[lints.clippy]
bool_assert_comparison = "allow"
field_reassign_with_default = "allow"
manual_clamp = "allow"
question_mark = "allow"
reserve_after_initialization = "allow"
too_many_arguments = "allow"
