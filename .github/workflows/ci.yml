name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Fmt / Clippy / Nextest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libx11-dev libxi-dev libxkbcommon-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev \
            libwayland-dev libegl1-mesa-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core crates)
        run: >-
          cargo clippy -p fret -p fret-a11y-accesskit -p fret-app -p fret-core -p fret-fonts
          -p fret-launch -p fret-launch-core -p fret-launch-desktop -p fret-launch-web
          -p fret-platform -p fret-platform-native -p fret-platform-web -p fret-render -p fret-runner-web
          -p fret-runner-winit -p fret-runtime -p fret-ui -p fret-ui-app --all-targets -- -D warnings

      - name: Nextest (default-members)
        run: cargo nextest run

      - name: Nextest (fret-gizmo f64-math)
        run: cargo nextest run -p fret-gizmo --features f64-math

  wasm_smoke:
    name: Wasm Compile Smoke (imui facade)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo check (wasm32-unknown-unknown)
        run: >-
          cargo check
          -p fret-authoring -p fret-imui -p fret-ui-kit --features imui
          -p fret-launch
          --target wasm32-unknown-unknown

  wasm_text_wrap:
    name: Wasm Text Wrap Conformance (node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cargo test (wasm32-unknown-unknown, wrap fixtures only)
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: >-
          cargo test -p fret-render-wgpu --target wasm32-unknown-unknown
          text_wrap_conformance_v1_fixtures_wasm
