name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Fmt / Clippy / Nextest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxkbcommon-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev \
            libwayland-dev libegl1-mesa-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core crates)
        run: >-
          cargo clippy -p fret -p fret-a11y-accesskit -p fret-app -p fret-core -p fret-fonts -p fret-launch
          -p fret-platform -p fret-platform-native -p fret-platform-web -p fret-render -p fret-runner-web
          -p fret-runner-winit -p fret-runtime -p fret-ui -p fret-ui-app --all-targets -- -D warnings

      - name: Nextest (default-members)
        run: cargo nextest run

      - name: Nextest (fret-gizmo f64-math)
        run: cargo nextest run -p fret-gizmo --features f64-math
