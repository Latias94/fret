name: Consistency Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  adr-and-layering:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Check ADR numbering
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_adr_numbers.ps1

      - name: Check layering policy
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_layering.ps1

      - name: Check execution surface
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_execution_surface.ps1

      - name: Check stringly command parsing
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_stringly_command_parsing.ps1

      - name: Check Lucide generated artifacts
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_lucide_generation.ps1

      - name: Check Radix generated artifacts
        shell: pwsh
        run: pwsh -NoProfile -File tools/check_radix_generation.ps1
