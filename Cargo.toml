[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.92"

[workspace.dependencies]
anyhow = "1"
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slotmap = "1"
taffy = "0.9.2"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
cosmic-text = "0.14.0"
arboard = "3.4.1"
wgpu = "28.0.0"
winit = "0.30.12"
naga = "28.0.0"
