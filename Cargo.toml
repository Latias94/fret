[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1"
bytemuck = { version = "1", features = ["derive"] }
etagere = "0.2"
pollster = "0.4"
raw-window-handle = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slotmap = "1"
taffy = "0.9.2"
wgpu = "27.0.1"
winit = "0.30.12"
