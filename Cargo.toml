[workspace]
members = [
    "crates/fret",
    "crates/fret-app",
    "crates/fret-components-app",
    "crates/fret-components-docking",
    "crates/fret-components-icons",
    "crates/fret-icons-lucide",
    "crates/fret-icons-radix",
    "crates/fret-components-shadcn",
    "crates/fret-components-ui",
    "crates/fret-core",
    "crates/fret-demo",
    "crates/fret-platform",
    "crates/fret-render",
    "crates/fret-runner-winit-wgpu",
    "crates/fret-runtime",
    "crates/fret-ui",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.92"

[workspace.dependencies]
anyhow = "1"
bytemuck = { version = "1", features = ["derive"] }
accesskit = "0.21.1"
accesskit_winit = "0.29.2"
cocoa = "0.26"
objc = "0.2"
pollster = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slotmap = "1"
taffy = "0.9.2"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
cosmic-text = "0.14.0"
unicode-script = "0.5.8"
arboard = "3.4.1"
wgpu = "28.0.0"
winit = "0.30.12"
naga = "28.0.0"
uuid = { version = "1", features = ["v4", "serde"] }
lyon = "1"
etagere = "0.2.15"
resvg = { version = "0.45.0", default-features = false, features = ["text", "system-fonts", "memmap-fonts"] }
usvg = { version = "0.45.0", default-features = false }
rust-embed = { version = "8.9.0", features = ["include-exclude"] }

# Speed up debug builds: Taffy is layout-hot and also expensive to compile unoptimized.
# GPUI applies a similar per-package opt-level override for Taffy.
[profile.dev.package.taffy]
opt-level = 3
